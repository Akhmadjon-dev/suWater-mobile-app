name: suwater_mobile
description: "WaterFlow Manager - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Camera + gallery
  image_picker: ^1.1.2

  # GPS
  geolocator: ^12.0.0

  # Map (OpenStreetMap - free, no API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Env vars
  flutter_dotenv: ^5.1.0

  # Model codegen
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Image caching (for document previews)
  cached_network_image: ^3.3.1

  # Date/locale formatting (Uzbek)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env.development
    - .env.production
